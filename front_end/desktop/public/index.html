<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebula</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar" data-tauri-drag-region>
        <img src="nebula-logo.png" alt="Nebula" class="brand-logo" data-tauri-drag-region />
        <div class="topbar-stats" id="topbar-stats">
          <span class="dot dot-mongo" id="dot-mongo" title="MongoDB">●</span>
          <span class="dot dot-gemini" id="dot-gemini" title="Gemini">●</span>
          <span class="stat" id="stat-count">0 files indexed</span>
          <span class="stat stat-project" id="stat-project"></span>
        </div>
        <div class="topbar-actions">
          <button class="btn-icon" id="btn-undo" title="Undo last action">↺</button>
          <button class="btn-icon" id="btn-rules" title="Install agent rules in active project">⎘</button>
          <button class="btn-icon" id="btn-settings" title="Settings">⚙</button>
        </div>
      </header>

      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <span>Projects</span>
          <button class="btn-mini" id="btn-new-project" title="Add project (browse for folder)">＋</button>
        </div>
        <ul class="proj-list" id="proj-list">
          <li class="proj active" data-id=""><div class="proj-name">All files</div><div class="proj-meta"><span id="proj-meta-all">—</span></div></li>
        </ul>
        <div class="sidebar-foot">
          <button class="btn-mini wide" id="btn-index-active" title="Index the active project's folder">⟳ Index project</button>
        </div>
      </aside>

      <nav class="modebar">
        <button class="mode active" data-mode="constellation">✦ Constellation</button>
        <button class="mode" data-mode="pipeline">▸ Pipeline</button>
        <button class="mode" data-mode="waterfall">▤ Scores</button>
      </nav>

      <section class="canvas-wrap">
        <canvas id="viz"></canvas>
        <div class="canvas-overlay" id="canvas-overlay"></div>
      </section>

      <section class="chat">
        <div id="log" class="log" aria-live="polite"></div>
        <form id="chat-form" class="chat-form">
          <div class="input-row">
            <textarea id="msg" rows="2" placeholder="Ask Nebula, e.g. 'find the auth diagram'"></textarea>
            <button type="submit" class="btn-send" aria-label="Send">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
              </svg>
            </button>
          </div>
          <div class="quickbar">
            <button type="button" class="chip" data-cmd="/index">/index project</button>
            <button type="button" class="chip" data-cmd="find the architecture diagram">find the architecture diagram</button>
            <button type="button" class="chip" data-cmd="/clear">/clear</button>
          </div>
        </form>
      </section>

      <footer class="feed" id="feed" aria-live="polite"></footer>
    </div>

    <div class="modal-backdrop hidden" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-title" id="modal-title">New project</div>
        <div class="modal-sub" id="modal-sub"></div>
        <input type="text" id="modal-input" autocomplete="off" />
        <div class="modal-row">
          <button type="button" id="modal-cancel" class="btn-mini">Cancel</button>
          <button type="button" id="modal-ok" class="btn-mini btn-primary">Add project</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>

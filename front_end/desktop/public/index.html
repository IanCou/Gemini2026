<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; background: #0a0a0f; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    color: #c8c4d8;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  ::selection { background: rgba(74,144,217,0.35); color: #fff; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(123,82,192,0.18); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(123,82,192,0.32); }

  .starfield-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 8% 12%, rgba(192,154,58,0.5), transparent 1px),
      radial-gradient(1px 1px at 22% 78%, rgba(192,80,74,0.4), transparent 1px),
      radial-gradient(1px 1px at 71% 28%, rgba(74,111,192,0.5), transparent 1px),
      radial-gradient(1px 1px at 86% 64%, rgba(74,140,92,0.45), transparent 1px),
      radial-gradient(1px 1px at 36% 42%, rgba(138,92,192,0.4), transparent 1px),
      radial-gradient(1px 1px at 58% 88%, rgba(255,255,255,0.25), transparent 1px),
      radial-gradient(1px 1px at 14% 56%, rgba(74,144,217,0.4), transparent 1px),
      radial-gradient(1px 1px at 92% 18%, rgba(245,166,35,0.4), transparent 1px);
    background-size: 800px 800px, 600px 600px, 700px 700px, 500px 500px, 900px 900px, 650px 650px, 750px 750px, 550px 550px;
  }
</style>
</head>
<body>
<div class="starfield-bg"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="backend.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="constellation.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = {
  "logoVariant": "cloud",
  "starDensity": 0.49,
  "surfaceLight": true,
  "motion": 78
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // ─── core state ──────────────────────────────────────────────────────────
  const [graph, setGraph] = React.useState(() => ({ nodes: [], edges: [], project: { name: 'Workspace', description: '' } }));
  const [selectedId, setSelectedId] = React.useState(null);
  const [hoverNode, setHoverNode] = React.useState(null);
  const [hoverPos, setHoverPos] = React.useState(null);
  const [searchValue, setSearchValue] = React.useState('');
  const [committedQuery, setCommittedQuery] = React.useState('');
  const [searchFocused, setSearchFocused] = React.useState(false);
  const [reticle, setReticle] = React.useState(null);
  const [cameraFocus, setCameraFocus] = React.useState(null);
  const [topMatches, setTopMatches] = React.useState([]);
  const [totalMatches, setTotalMatches] = React.useState(0);
  const [pulseIds, setPulseIds] = React.useState(() => new Set());
  const [camPos, setCamPos] = React.useState(null);
  const [selectedNodeOverride, setSelectedNodeOverride] = React.useState(null);

  // ─── backend state ───────────────────────────────────────────────────────
  const [projects, setProjects] = React.useState([]);
  const [projectRoot, setProjectRoot] = React.useState(null);
  const [chatOpen, setChatOpen] = React.useState(false);

  // overlay states: 'onboarding' | 'indexing' | 'error' | null
  const [overlay, setOverlay] = React.useState(null);
  const [indexingProgress, setIndexingProgress] = React.useState(1);
  const [currentFile, setCurrentFile] = React.useState('');
  const [apiKey, setApiKey] = React.useState('');

  // ─── pipeline (SSE indexing) state ───────────────────────────────────────
  const EMPTY_PIPELINE = { stages: { loaded: 0, embed: 0, insert: 0, done: 0, error: 0 }, total: 0, recent: [] };
  const [pipeline, setPipeline] = React.useState(EMPTY_PIPELINE);
  const [pipelineVisible, setPipelineVisible] = React.useState(false);
  const pipelineHideTimer = React.useRef(null);

  const cameraRef = React.useRef(null);

  // ─── load real projects + check API key on mount ──────────────────────────
  React.useEffect(() => {
    fetch('http://127.0.0.1:8765/health')
      .then(r => r.json())
      .then(h => { if (h.gemini_key_set) setApiKey('ENV_LOADED'); })
      .catch(() => {});

    fetchProjects().then(ps => {
      setProjects(ps);
      if (ps.length > 0) {
        setProjectRoot(ps[0].id || null);
      } else {
        setOverlay('onboarding');
      }
    }).catch(() => {
      setOverlay('onboarding');
    });
  }, []);

  // ─── rebuild graph when projectRoot changes ───────────────────────────────
  React.useEffect(() => {
    const load = async () => {
      let g;
      const projName = (projects.find(p => p.id === projectRoot) || {}).name;
      try {
        g = await buildGraphFromBackend(projectRoot || '', projName);
      } catch {
        g = { nodes: [], edges: [], project: { name: projName || 'Workspace', description: '' } };
      }
      setGraph(g);
      setSelectedId(null);
      setSelectedNodeOverride(null);
      setReticle(null);
      setCameraFocus(null);
      setTopMatches([]);
      setTotalMatches(0);
      setPulseIds(new Set());
      setSearchValue('');
      setCommittedQuery('');
      if (g.nodes.length > 0) runIndexingAnimation(g);
      else setOverlay(null);
    };
    load();
  // eslint-disable-next-line
  }, [projectRoot, projects]);

  // ─── refresh graph from backend (called after agent fs changes) ───────────
  const refreshGraph = React.useCallback(async () => {
    if (!projectRoot) return;
    const projName = (projects.find(p => p.id === projectRoot) || {}).name;
    try {
      const g = await buildGraphFromBackend(projectRoot, projName);
      setGraph(g);
    } catch {}
    fetchProjects().then(ps => setProjects(ps)).catch(() => {});
  }, [projectRoot, projects]);

  // ─── agent surfaces a top result → drop into the search bar ──────────────
  const handleAgentResult = React.useCallback(({ query, hits }) => {
    if (!hits || hits.length === 0) return;
    // Push the user's natural-language query into the search bar — that
    // re-runs the semantic search and lights up the matching constellation
    // nodes. The user sees both the chat answer and the visual reticle.
    const q = (query || '').trim();
    if (q) {
      setSearchValue(q);
      setCommittedQuery(q);
    }
    // Also, directly pulse the specific files the agent returned so that
    // even if a hit doesn't pop in the semantic search top-k, the user sees
    // it light up.
    const matchIds = new Set();
    hits.forEach(h => {
      const target = (h || '').trim();
      if (!target) return;
      const match = graph.nodes.find(n =>
        n.path === target || n.name === target || (target.endsWith(n.name) && n.name)
      );
      if (match) matchIds.add(match.id);
    });
    if (matchIds.size > 0) setPulseIds(matchIds);
  }, [graph]);

  // ─── real SSE indexing ────────────────────────────────────────────────────
  const startIndexing = React.useCallback((pid, force = false) => {
    if (!pid) return;
    clearTimeout(pipelineHideTimer.current);
    setPipeline(EMPTY_PIPELINE);
    setPipelineVisible(true);
    streamIndexProject(pid, (type, data) => {
      if (type === 'start') {
        setPipeline(prev => ({ ...prev, total: data.total || 0 }));
      } else if (type === 'stage') {
        setPipeline(prev => {
          const stages = { ...prev.stages };
          if (data.stage in stages) stages[data.stage]++;
          const recent = data.stage === 'loaded'
            ? [...prev.recent.slice(-9), data.file]
            : prev.recent;
          return { ...prev, stages, recent };
        });
      } else if (type === 'end') {
        pipelineHideTimer.current = setTimeout(() => setPipelineVisible(false), 4000);
        // Refetch projects first so the new file count + name are up to date,
        // then rebuild the graph with the correct project name in the header.
        fetchProjects()
          .then(ps => {
            setProjects(ps);
            const projName = (ps.find(p => p.id === pid) || {}).name;
            return buildGraphFromBackend(pid, projName);
          })
          .then(g => { if (g) { setGraph(g); if (g.nodes.length > 0) runIndexingAnimation(g); } })
          .catch(() => {});
      } else if (type === 'error') {
        pipelineHideTimer.current = setTimeout(() => setPipelineVisible(false), 3000);
      }
    }, force);
  }, []);

  // ─── save API key to .env via backend ────────────────────────────────────
  const handleApiKeyChange = React.useCallback(async (key) => {
    if (!key || key === 'ENV_LOADED') return;
    setApiKey(key);
    try {
      await fetch('http://127.0.0.1:8765/api/settings/apikey', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key }),
      });
    } catch {}
  }, []);

  // ─── indexing animation (constellation reveal) ────────────────────────────
  const runIndexingAnimation = React.useCallback((g) => {
    setOverlay('indexing');
    setIndexingProgress(0);
    const total = g.nodes.length;
    const start = performance.now();
    const duration = 2200;
    const step = () => {
      const t = Math.min(1, (performance.now() - start) / duration);
      const eased = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
      setIndexingProgress(eased);
      const idx = Math.min(total - 1, Math.floor(eased * total));
      setCurrentFile(g.nodes[idx]?.path || '');
      if (t < 1) requestAnimationFrame(step);
      else {
        setIndexingProgress(1);
        setTimeout(() => setOverlay(null), 350);
      }
    };
    requestAnimationFrame(step);
  }, []);

  // ─── search ───────────────────────────────────────────────────────────────
  React.useEffect(() => {
    const q = committedQuery.trim();
    if (!q) {
      setReticle(null);
      setCameraFocus(null);
      setTopMatches([]);
      setTotalMatches(0);
      setPulseIds(new Set());
      return;
    }

    const runSearch = async () => {
      let scored = [];

      // Try real backend search first
      if (projectRoot) {
        try {
          scored = await searchFiles(q, projectRoot, graph.nodes);
        } catch { /* fall through to in-memory */ }
      }

      // Fallback: in-memory fuzzy match
      if (scored.length === 0) {
        const ql = q.toLowerCase();
        scored = graph.nodes.map(n => {
          const name = n.name.toLowerCase();
          const cluster = n.cluster.toLowerCase();
          const path = n.path.toLowerCase();
          let score = 0;
          if (name === ql) score = 100;
          else if (name.startsWith(ql)) score = 80;
          else if (name.includes(ql)) score = 60;
          else if (cluster === ql) score = 50;
          else if (cluster.includes(ql)) score = 40;
          else if (path.includes(ql)) score = 20;
          if (score > 0) score += Math.max(0, 10 - name.length * 0.2);
          return { node: n, score };
        }).filter(x => x.score > 0);
      }

      if (scored.length === 0) {
        setPulseIds(new Set());
        setReticle(null);
        setCameraFocus(null);
        setTopMatches([]);
        setTotalMatches(0);
        return;
      }

      scored.sort((a, b) => b.score - a.score);
      setPulseIds(new Set());
      setTotalMatches(scored.length);
      setTopMatches(scored.slice(0, 3));
      setReticle(null);

      const best = scored[0].node;
      const second = scored[1];
      const ambiguous = second && (scored[0].score - second.score) <= 8 && second.node.cluster === best.cluster;
      const sameCluster = scored.map(s => s.node).filter(n => n.cluster === best.cluster);
      const focusSet = sameCluster.length >= 2 ? sameCluster : scored.map(s => s.node);

      const cx = focusSet.reduce((s, n) => s + n.x, 0) / focusSet.length;
      const cy = focusSet.reduce((s, n) => s + n.y, 0) / focusSet.length;
      const cz = focusSet.reduce((s, n) => s + n.z, 0) / focusSet.length;

      let vx, vy, vz;
      if (ambiguous || focusSet.length < 2) {
        const olen = Math.hypot(cx, cy, cz) || 1;
        vx = cx/olen; vy = cy/olen; vz = cz/olen;
      } else {
        const dx = best.x - cx, dy = best.y - cy, dz = best.z - cz;
        const dlen = Math.hypot(dx, dy, dz) || 1;
        vx = dx/dlen; vy = dy/dlen; vz = dz/dlen;
      }

      let spread = 0;
      focusSet.forEach(n => { spread = Math.max(spread, Math.hypot(n.x - cx, n.y - cy, n.z - cz)); });
      const distance = Math.max(110, Math.min(280, spread * (ambiguous ? 5.5 : 4.6) + (ambiguous ? 110 : 90)));
      const phi = Math.acos(Math.max(-1, Math.min(1, vy)));
      const theta = Math.atan2(vz, vx);
      setCameraFocus({ target: { x: cx, y: cy, z: cz }, bestPos: { x: best.x, y: best.y, z: best.z }, theta, phi, distance });
    };

    runSearch();
  }, [committedQuery, graph, projectRoot]);

  const frameNodes = React.useCallback((nodes, best = null, mode = 'best') => {
    if (!nodes || nodes.length === 0) return;
    const cx = nodes.reduce((s, n) => s + n.x, 0) / nodes.length;
    const cy = nodes.reduce((s, n) => s + n.y, 0) / nodes.length;
    const cz = nodes.reduce((s, n) => s + n.z, 0) / nodes.length;
    let vx, vy, vz;
    if (mode === 'best' && best) {
      const dx = best.x - cx, dy = best.y - cy, dz = best.z - cz;
      const dlen = Math.hypot(dx, dy, dz);
      if (dlen > 0.001) { vx = dx/dlen; vy = dy/dlen; vz = dz/dlen; }
    }
    if (vx === undefined) {
      const olen = Math.hypot(cx, cy, cz);
      if (olen > 0.001) { vx = cx/olen; vy = cy/olen; vz = cz/olen; }
      else { vx = 0; vy = 0; vz = 1; }
    }
    let spread = 0;
    nodes.forEach(n => { spread = Math.max(spread, Math.hypot(n.x - cx, n.y - cy, n.z - cz)); });
    const distance = Math.max(110, Math.min(280, spread * (mode === 'best' ? 4.6 : 5.5) + (mode === 'best' ? 90 : 110)));
    const phi = Math.acos(Math.max(-1, Math.min(1, vy)));
    const theta = Math.atan2(vz, vx);
    setCameraFocus({ target: { x: cx, y: cy, z: cz }, theta, phi, distance });
  }, []);

  const onPickResult = React.useCallback((node) => {
    setPulseIds(new Set());
    setReticle(null);
    if (node.id >= 0) {
      // Real graph node — fly the camera to it
      frameNodes([node], node, 'best');
      setSelectedId(node.id);
      setSelectedNodeOverride(null);
    } else {
      // Synthetic hit (not in constellation) — just open preview panel
      setSelectedId(null);
      setSelectedNodeOverride(node);
    }
  }, [frameNodes]);

  const onPickCluster = React.useCallback((clusterName) => {
    const inCluster = graph.nodes.filter(n => n.cluster === clusterName);
    if (inCluster.length === 0) return;
    setPulseIds(new Set());
    setReticle(null);
    frameNodes(inCluster, null, 'cluster');
  }, [graph, frameNodes]);

  const onHover = React.useCallback((node, screen) => {
    setHoverNode(node);
    setHoverPos(screen);
  }, []);

  const onNodeClick = React.useCallback((node) => {
    setSelectedId(node.id);
    setSelectedNodeOverride(null);
    setPulseIds(new Set());
    setReticle(null);
    frameNodes([node], node, 'best');
  }, [frameNodes]);

  const onCameraChange = React.useCallback((pos) => {
    setCamPos({ x: pos.x, y: pos.y, z: pos.z });
  }, []);

  const selectedNode = selectedId != null ? graph.nodes[selectedId] : selectedNodeOverride;

  const allProjectsMap = React.useMemo(() => {
    const m = {};
    projects.forEach(p => {
      m[p.id] = { name: p.name, description: `${p.count || 0} files` };
    });
    return m;
  }, [projects]);

  const currentProjectKey = projectRoot || (projects.length > 0 ? (projects[0].id || '') : '');

  return (
    <div style={{ position: 'relative', width: '100vw', height: '100vh', background: '#0a0a0f' }}>
      <Constellation
        graph={graph}
        starFieldDensity={tweaks.starDensity}
        surfaceLightness={tweaks.surfaceLight ? 1 : 0}
        motionIntensity={tweaks.motion / 100}
        reticle={reticle}
        cameraFocus={cameraFocus}
        pulseIds={pulseIds}
        onHover={onHover}
        onClick={onNodeClick}
        selectedId={selectedId}
        cameraRef={cameraRef}
        onCameraChange={onCameraChange}
        indexingProgress={indexingProgress}
      />

      <AppHeader
        projectKey={currentProjectKey}
        project={graph.project}
        allProjects={allProjectsMap}
        onPickProject={(k) => setProjectRoot(k)}
        logoVariant={tweaks.logoVariant}
        surfaceLight={tweaks.surfaceLight}
        onSwitchProject={() => setOverlay('onboarding')}
        onDeleteProject={async (pid) => {
          if (confirm('Delete this project?')) {
            await window.deleteProject(pid);
            if (projectRoot === pid) setProjectRoot(null);
            fetchProjects().then(ps => setProjects(ps));
          }
        }}
      />

      <SettingsButton
        apiKey={apiKey}
        onApiKeyChange={handleApiKeyChange}
        onReindex={() => startIndexing(projectRoot, true)}
      />

      {hoverNode && hoverPos && hoverNode.id !== selectedId && (
        <HoverTooltip node={hoverNode} screen={hoverPos} />
      )}

      <MiniMap graph={graph} camPos={camPos} selectedId={selectedId} pulseIds={pulseIds} />

      <TopResults
        results={topMatches}
        mimeColors={window.MIME_COLORS}
        onPick={onPickResult}
        onPickCluster={onPickCluster}
      />

      <SearchBar
        value={searchValue}
        onChange={setSearchValue}
        onSubmit={(v) => { setCommittedQuery(v); setSearchFocused(false); }}
        suggestionsOpen={searchFocused && !searchValue}
        onFocus={() => setSearchFocused(true)}
        onBlur={() => setTimeout(() => setSearchFocused(false), 150)}
        suggestions={SUGGESTED_QUERIES}
        onPickSuggestion={(s) => { setSearchValue(s); setCommittedQuery(s); setSearchFocused(false); }}
        onClear={() => { setSearchValue(''); setCommittedQuery(''); }}
        committedQuery={committedQuery}
        matches={totalMatches}
        chatOpen={chatOpen}
        onChatToggle={() => setChatOpen(o => !o)}
      />

      {selectedNode && !chatOpen && (
        <PreviewPanel
          node={selectedNode}
          graph={graph}
          surfaceLight={tweaks.surfaceLight}
          onClose={() => { setSelectedId(null); setSelectedNodeOverride(null); }}
          onPickNeighbor={(n) => { setSelectedId(n.id); setSelectedNodeOverride(null); }}
        />
      )}

      <ChatPanel
        open={chatOpen}
        onClose={() => setChatOpen(false)}
        projectRoot={projectRoot}
        surfaceLight={tweaks.surfaceLight}
        onAgentResult={handleAgentResult}
        onAgentFsChange={refreshGraph}
      />

      {overlay === 'indexing' && (
        <IndexingOverlay
          progress={indexingProgress}
          fileCount={graph.nodes.length}
          currentFile={currentFile}
        />
      )}

      {overlay === 'onboarding' && (
        <OnboardingOverlay
          logoVariant={tweaks.logoVariant}
          apiKeySet={!!apiKey}
          onDropFolder={async () => {
            setOverlay(null);
            try {
              const BASE = 'http://127.0.0.1:8765';
              const folderRes = await fetch(`${BASE}/api/dialog/pick_folder`);
              const { path } = await folderRes.json();
              if (!path) return;
              const name = path.replace(/\\/g, '/').split('/').filter(Boolean).pop() || path;
              const createRes = await fetch(`${BASE}/api/projects`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, root: path }),
              });
              const proj = await createRes.json();
              const ps = await fetchProjects();
              setProjects(ps);
              setProjectRoot(proj.id);
              startIndexing(proj.id);
            } catch {
              setOverlay('error');
            }
          }}
        />
      )}

      <PipelineBar state={pipeline} visible={pipelineVisible} />

      {overlay === 'error' && (
        <ErrorOverlay
          message="Could not reach the embeddings service."
          onRetry={() => { setOverlay(null); runIndexingAnimation(graph); }}
          onDismiss={() => setOverlay(null)}
        />
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Identity" />
        <TweakRadio label="Logo glyph" value={tweaks.logoVariant}
                    options={['cloud', 'rings', 'cluster']}
                    onChange={(v) => setTweak('logoVariant', v)} />

        <TweakSection label="Atmosphere" />
        <TweakSlider label="Star density" value={Math.round(tweaks.starDensity * 100)}
                     min={0} max={100} unit="%"
                     onChange={(v) => setTweak('starDensity', v / 100)} />
        <TweakSlider label="Motion" value={tweaks.motion} min={0} max={100} unit="%"
                     onChange={(v) => setTweak('motion', v)} />
        <TweakToggle label="Lighter panels" value={tweaks.surfaceLight}
                     onChange={(v) => setTweak('surfaceLight', v)} />

        <TweakSection label="States" />
        <TweakButton label="Re-index project" onClick={() => startIndexing(projectRoot, true)} />
        <TweakButton label="Show onboarding" onClick={() => setOverlay('onboarding')} />
        <TweakButton label="Show error state" onClick={() => setOverlay('error')} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
